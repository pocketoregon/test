<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech & Gaming Calendar Sandbox</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121214; color: #e1e1e6; margin: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #ff4554; border-bottom: 2px solid #29292e; padding-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
        .day { background: #202024; border: 1px solid #29292e; padding: 15px; min-height: 80px; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        .day:hover { border-color: #ff4554; background: #28282e; }
        .day.has-events { border-left: 4px solid #ff4554; }
        .day-number { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; }
        .badge { background: #ff4554; color: white; font-size: 0.75em; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #202024; border: 2px solid #ff4554; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 8px; z-index: 100; max-width: 400px; width: 100%; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }
        .close-btn { background: #ff4554; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; float: right; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 Tech & Gaming Tracker <span style="font-size: 0.5em; color: #8d8d99;">(Sandbox Mode)</span></h1>
    <p>Click any date to preview upcoming releases parsed by your AI Agent.</p>
    
    <!-- Hardcoded grid representing May/June 2026 for testing purposes -->
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal" id="eventModal">
    <button class="close-btn" onclick="closeModal()">Close</button>
    <h3 id="modalDate" style="color: #ff4554;">Date</h3>
    <div id="modalContent">No events scheduled.</div>
</div>

<script>
    let calendarData = {};

    // Load your isolated JSON database
    fetch('sandbox_calendar.json')
        .then(res => res.json())
        .then(data => {
            calendarData = data;
            generateSandboxCalendar();
        })
        .catch(err => console.log("Waiting for sandbox_calendar.json to be created..."));

    function generateSandboxCalendar() {
        const grid = document.getElementById('calendarGrid');
        // Let's generate a mockup window of days around May 2026
        for (let i = 24; i <= 31; i++) {
            const dateStr = `2026-05-${i}`;
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day';
            
            let badgeHtml = '';
            if (calendarData[dateStr]) {
                dayDiv.classList.add('has-events');
                const count = calendarData[dateStr].gaming?.length || 0;
                badgeHtml = `<span class="badge">${count} Drop(s)</span>`;
            }
            
            dayDiv.innerHTML = `<div class="day-number">${i}</div>${badgeHtml}<div style="font-size:0.75em;color:#8d8d99;">May</div>`;
            dayDiv.onclick = () => showEvents(dateStr);
            grid.appendChild(dayDiv);
        }
    }

    function showEvents(date) {
        document.getElementById('modalDate').innerText = date;
        const content = document.getElementById('modalContent');
        
        if (calendarData[date] && calendarData[date].gaming?.length > 0) {
            let html = '<ul>';
            calendarData[date].gaming.forEach(evt => {
                html += `<li style="margin-bottom:10px;"><strong>${evt.title}</strong> <br><small style="color:#8d8d99;">Source: ${evt.source}</small></li>`;
            });
            html += '</ul>';
            content.innerHTML = html;
        } else {
            content.innerHTML = '<p style="color:#8d8d99;">No major tech or gaming events recorded for this date yet.</p>';
        }
        
        document.getElementById('eventModal').style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('eventModal').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'none';
    }
</script>
</body>
</html>
