<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech & Gaming Calendar Sandbox</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121214;
            color: #e1e1e6;
            margin: 40px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: #ff4554;
            border-bottom: 2px solid #29292e;
            padding-bottom: 10px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .day {
            background: #202024;
            border: 1px solid #29292e;
            padding: 15px;
            min-height: 80px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .day:hover {
            border-color: #ff4554;
            background: #28282e;
        }
        .day.has-events {
            border-left: 4px solid #ff4554;
            background: #1a1518;
        }
        .day-number {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        .badge {
            background: #ff4554;
            color: white;
            font-size: 0.75em;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            text-align: center;
        }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #202024;
            border: 2px solid #ff4554;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            z-index: 100;
            max-width: 400px;
            width: 100%;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 99;
        }
        .close-btn {
            background: #ff4554;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            float: right;
        }
        .event-item {
            background: #29292e;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 Tech & Gaming Tracker <span style="font-size: 0.5em; color: #8d8d99;">(Live Sandbox)</span></h1>
    <p>Click any highlighted date to preview upcoming releases parsed live by your AI Agent.</p>
    
    <h2 style="color: #ccc; margin-top: 30px;">May 2026</h2>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal" id="eventModal">
    <button class="close-btn" onclick="closeModal()">Close</button>
    <h3 id="modalDate" style="color: #ff4554;">Date</h3>
    <div id="modalContent">No events scheduled.</div>
</div>

<script>
    let calendarData = {};

    // Helper function to force double digits (e.g., "01" instead of "1")
    function padZero(num) {
        return num.toString().padStart(2, '0');
    }

    // Fetch the AI generated database
    fetch('./sandbox_calendar.json')
        .then(response => {
            if (!response.ok) throw new Error("No database file found yet.");
            return response.json();
        })
        .then(data => {
            calendarData = data;
            renderCalendar();
        })
        .catch(err => {
            console.warn("Using empty sandbox layout:", err.message);
            renderCalendar();
        });

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        // Generate 31 days for May 2026
        for (let i = 1; i <= 31; i++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day';
            
            // Format strictly as YYYY-MM-DD matching the AI payload
            const dateStr = `2026-05-${padZero(i)}`;
            
            dayDiv.innerHTML = `<span class="day-number">${i}</span>`;
            
            // Check if the AI wrote entries for this specific padded key
            if (calendarData[dateStr] && calendarData[dateStr].gaming) {
                dayDiv.classList.add('has-events');
                const eventCount = calendarData[dateStr].gaming.length;
                dayDiv.innerHTML += `<span class="badge">${eventCount} Game${eventCount > 1 ? 's' : ''}</span>`;
            }

            dayDiv.onclick = () => openModal(dateStr);
            grid.appendChild(dayDiv);
        }
    }

    function openModal(date) {
        document.getElementById('modalDate').innerText = date;
        const contentDiv = document.getElementById('modalContent');
        contentDiv.innerHTML = '';

        if (calendarData[date] && calendarData[date].gaming) {
            calendarData[date].gaming.forEach(item => {
                contentDiv.innerHTML += `
                    <div class="event-item">
                        <strong>🚀 ${item.title}</strong><br>
                        <small style="color: #8d8d99;">Source: ${item.source}</small>
                    </div>`;
            });
        } else {
            contentDiv.innerHTML = '<p style="color: #8d8d99;">No game releases scheduled for this date.</p>';
        }

        document.getElementById('eventModal').style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('eventModal').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'none';
    }
</script>

</body>
</html>
